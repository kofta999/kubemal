apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubemal-depl
  namespace: kubemal-ns
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubemal
  template:
    metadata:
      labels:
        app: kubemal
    spec:
      serviceAccountName: kubemal-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kubemal
          image: kofta/kubemal:f6991dfb7b6bbcfba0ba5640d9d47e8e483a75e1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tls-secret
              mountPath: /app/tls
              readOnly: true
      volumes:
        - name: tls-secret
          secret:
            secretName: kubemal-tls
---
apiVersion: v1
kind: Service
metadata:
  name: kubemal-service
  namespace: kubemal-ns
  labels:
    app: kubemal
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ClusterIP
  selector:
    app: kubemal
  ports:
    - name: http
      port: 443
      targetPort: 3000
      protocol: TCP
