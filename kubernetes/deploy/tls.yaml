apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-cluster-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kubemal-cert
  namespace: kubemal-ns
spec:
  secretName: kubemal-tls

  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048

  duration: 2160h # 90d
  renewBefore: 360h # 15d

  subject:
    organizations:
      - kubemal

  dnsNames:
    - kubemal-service.kubemal-ns.svc
    - kubemal-service.kubemal-ns.svc.cluster.local
    - kubemal-service.kubemal-ns
    - kubemal-service

  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer
    group: cert-manager.io
