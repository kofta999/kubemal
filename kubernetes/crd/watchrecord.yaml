apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: watchrecords.kubemal.kofta.app
spec:
  group: kubemal.kofta.app
  scope: Namespaced
  names:
    kind: WatchRecord
    plural: watchrecords
    singular: watchrecord
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            status:
              type: object
              properties:
                watchState:
                  type: string
            spec:
              type: object
              properties:
                username:
                  type: string
                animeRef:
                  required: ["name"]
                  type: object
                  properties:
                    name:
                      type: string
                episodesWatched:
                  type: integer
                score:
                  type: integer
                  minimum: 1
                  maximum: 10
                status:
                  type: string
                  enum: ["OnHold", "PlanToWatch", "Dropped"]
